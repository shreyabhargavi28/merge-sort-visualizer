<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Merge Sort Visualizer | Puzzle-Based Learning</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-wrapper">
        <!-- Simplified Header with Algorithm Info -->
        <header class="header">
            <div class="logo-section">
                <h1>🔄 Merge Sort Visualizer</h1>
                <p class="subtitle">Puzzle-Based Learning</p>
            </div>
            <div class="algorithm-info">
                <div class="info-chip">
                    <span class="info-label">Time</span>
                    <span class="info-value">O(n log n)</span>
                </div>
                <div class="info-divider"></div>
                <div class="info-chip">
                    <span class="info-label">Space</span>
                    <span class="info-value">O(n)</span>
                </div>
                <div class="info-divider"></div>
                <div class="info-chip">
                    <span class="info-label">Stability</span>
                    <span class="info-value">✓ Stable</span>
                </div>
            </div>
        </header>

        <!-- Two Column Layout -->
        <div class="two-columns">
            <!-- LEFT COLUMN: Algorithm Visualization -->
            <div class="column algorithm-column">
                <div class="phase-indicator" id="phaseIndicator">
                    <span class="phase-badge" id="phaseLabel">Ready</span>
                </div>

                <!-- Array Visualization -->
                <div class="array-container" id="arrayContainer"></div>

                <!-- Controls Section -->
                <div class="controls-section">
                    <div class="controls-row">
                        <button id="playBtn" class="ctrl-btn primary">▶ Play</button>
                        <button id="pauseBtn" class="ctrl-btn">⏸ Pause</button>
                        <button id="stepBackBtn" class="ctrl-btn">◀ Step Back</button>
                        <button id="stepForwardBtn" class="ctrl-btn">Step Forward ▶</button>
                        <button id="resetBtn" class="ctrl-btn">⟳ Reset</button>
                    </div>
                    
                    <div class="controls-row">
                        <div class="control-group">
                            <label>⚡ Speed</label>
                            <input type="range" id="speedSlider" min="100" max="1000" value="400" step="10">
                            <span id="speedValue" class="value-display">400ms</span>
                        </div>
                        
                        <div class="control-group">
                            <label>📊 Array Size</label>
                            <input type="range" id="sizeSlider" min="6" max="12" value="8" step="1">
                            <span id="sizeValue" class="value-display">8</span>
                        </div>
                        
                        <div class="control-group">
                            <label>✏️ Custom Array</label>
                            <input type="text" id="customArray" placeholder="e.g., 64, 25, 12, 22, 11">
                            <button id="applyCustomBtn" class="small-btn">Apply</button>
                        </div>
                    </div>
                </div>

                <!-- Show Code Button -->
                <button id="showCodeBtn" class="show-code-btn">📄 Show Code</button>

                <!-- Collapsible Code Section -->
                <div id="codeSection" class="code-section collapsed">
                    <div class="code-header">
                        <h3>💻 Merge Sort Implementation</h3>
                        <div class="lang-tabs">
                            <button class="lang-tab active" data-lang="python">Python</button>
                            <button class="lang-tab" data-lang="javascript">JavaScript</button>
                            <button class="lang-tab" data-lang="java">Java</button>
                            <button class="lang-tab" data-lang="cpp">C++</button>
                        </div>
                    </div>
                    <div class="code-display">
                        <pre id="codeBlock"><code>Loading...</code></pre>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: Puzzle Visualization -->
            <div class="column puzzle-column">
                <div class="puzzle-header">
                    <h2>🧩 Building Puzzle</h2>
                    <div class="progress-container">
                        <div class="progress-text">
                            <span>Puzzle Completion</span>
                            <strong id="progressPercent">0</strong>%
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="progressFill"></div>
                        </div>
                    </div>
                </div>
                
                <div class="puzzle-container">
                    <canvas id="puzzleCanvas" width="500" height="500"></canvas>
                </div>
                
                <div class="puzzle-message" id="puzzleMessage">
                    ✨ Each merge operation reveals more of the image!
                </div>
            </div>
        </div>
    </div>

    <script src="js/mergeSort.js"></script>
    <script src="js/puzzle.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
